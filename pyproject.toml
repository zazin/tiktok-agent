[project]
name = "tiktok-agent"
version = "0.1.0"
description = "Poll the ImageKit /tiktok folder, push new images to a connected Android phone over adb, and optionally auto-post them to TikTok."
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
tiktok-agent = "agent:_cli"
tiktok-source = "imagekit_source:_cli"

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
include = [
    "agent.py",
    "imagekit_source.py",
    "adb_pusher.py",
    "tiktok_poster.py",
    "env_loader.py",
]
